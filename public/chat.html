<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <title>在线客服</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https: data: blob:; media-src 'self' https: data: blob:; connect-src 'self'; style-src 'self'; script-src 'self'; base-uri 'none'">
  <link rel="stylesheet" href="/chat.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="name" id="displayName">在线客服</div>
      <div class="status" id="statusText">连接中</div>
    </header>
    <main id="messages"></main>
    <div class="quick" id="quickReplies" hidden></div>
    <footer>
      <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" hidden>
      <button class="attach" id="attachBtn" type="button" title="发送图片或文件">📎</button>
      <textarea id="input" rows="1" placeholder="请输入消息"></textarea>
      <button class="send" id="sendBtn" type="button">发送</button>
    </footer>
  </div>
  <div class="notice" id="notice"></div>
  <div class="debug" id="debug" hidden></div>

  <script src="/chat.js" defer></script>
</body>
</html>
