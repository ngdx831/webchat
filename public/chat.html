<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>在线客服</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https: data:; media-src 'self' https:; connect-src 'self'; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'none'">
  <link rel="stylesheet" href="/chat.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="name" id="displayName">在线客服</div>
      <div class="status" id="statusText">连接中</div>
    </header>
    <main id="messages"></main>
    <div class="quick" id="quickReplies" hidden></div>
    <footer>
      <textarea id="input" rows="1" placeholder="请输入消息"></textarea>
      <button class="send" id="sendBtn" type="button">发送</button>
    </footer>
  </div>

  <script src="/chat.js" defer></script>
</body>
</html>
