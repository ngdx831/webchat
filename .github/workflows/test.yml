name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m py_compile $(find . -name '*.py' -not -path './data/*')
      - run: WEBCHAT_TOKEN_KEY=45_3WKFv7XuSizf8ugfEGwANpINcSQz08wQiLKvyxfE= pytest -v
